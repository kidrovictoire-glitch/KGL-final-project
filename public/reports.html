<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KGL Reports | Export Center</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="CSS/reports-page.css">
</head>

<body>
  <nav class="sidebar">
    <div class="p-4 text-center">
      <h3 class="fw-bold mb-0">KGL</h3>
      <small class="text-dark"><b>REPORTS CENTER</b></small>
      <hr class="bg-white opacity-25">
    </div>
    <ul class="nav flex-column">
      <li class="nav-item"><a href="director.html" class="nav-link w-100 text-start"><i
            class="bi bi-house-door me-2"></i> Back to Director</a></li>
      <li class="nav-item"><a href="reports.html" class="nav-link active w-100 text-start"><i
            class="bi bi-file-earmark-bar-graph me-2"></i> Reports & Export</a></li>
    </ul>
  </nav>

  <div class="main-wrapper">
    <header class="p-3 bg-white border-bottom d-flex justify-content-between align-items-center">
      <span class="fw-medium text-muted">Director / <strong>Reports & Export</strong></span>
      <span class="badge bg-success p-2 px-3 rounded-pill">Mr. Orban</span>
    </header>

    <main class="p-4">
      <div class="card branch-card p-4 mb-4">
        <h5 class="fw-bold mb-3">Report Filters</h5>
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Branch</label>
            <select id="filterBranch" class="form-select">
              <option value="All">All Branches</option>
              <option value="Maganjo">Maganjo</option>
              <option value="Matugga">Matugga</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label">Report Type</label>
            <select id="filterType" class="form-select">
              <option value="all">All Transactions</option>
              <option value="cash">Cash Sales</option>
              <option value="credit">Credit Sales</option>
              <option value="procurement">Procurement</option>
              <option value="inventory">Inventory Snapshot</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">From Date</label>
            <input id="fromDate" type="date" class="form-control">
          </div>
          <div class="col-md-2">
            <label class="form-label">To Date</label>
            <input id="toDate" type="date" class="form-control">
          </div>
          <div class="col-md-2 d-grid align-items-end">
            <button id="applyFiltersBtn" class="btn btn-success mt-4">Apply</button>
          </div>
        </div>
      </div>

      <div class="revenue-grid mb-4">
        <div class="period-card">
          <div class="period-label">Cash Revenue</div>
          <div id="sumCashRevenue" class="period-value">UGX 0</div>
        </div>
        <div class="period-card">
          <div class="period-label">Credit Receivables</div>
          <div id="sumCreditDue" class="period-value text-danger">UGX 0</div>
        </div>
        <div class="period-card">
          <div class="period-label">Procurement Cost</div>
          <div id="sumProcurementCost" class="period-value">UGX 0</div>
        </div>
        <div class="period-card">
          <div class="period-label">Moved Tonnage</div>
          <div id="sumTonnage" class="period-value text-primary">0 Kg</div>
        </div>
      </div>

      <div class="card branch-card p-4">
        <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3 no-print">
          <h5 class="fw-bold m-0">Report Preview</h5>
          <div class="d-flex gap-2">
            <button id="refreshDataBtn" class="btn btn-outline-secondary btn-sm"><i
                class="bi bi-arrow-clockwise me-1"></i> Sync Latest</button>
            <button id="exportCsvBtn" class="btn btn-outline-success btn-sm"><i class="bi bi-filetype-csv me-1"></i>
              Export CSV</button>
            <button id="exportPdfBtn" class="btn btn-outline-primary btn-sm"><i class="bi bi-filetype-pdf me-1"></i>
              Export PDF</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-striped align-middle">
            <thead class="table-light">
              <tr id="reportHeadRow"></tr>
            </thead>
            <tbody id="reportBody"></tbody>
          </table>
        </div>
        <div id="reportEmpty" class="text-muted small hidden-section">No records for current filters.</div>
      </div>
    </main>
  </div>

  <script src="js/api-reports.js"></script>
  <script src="js/reports.js"></script>
</body>

</html>
